version: '3.8'

services:

  # --- 1. DATABASE SERVICE ---
  # Runs a PostgreSQL database using our Dockerfile.db
  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    container_name: database_container
    environment:
      POSTGRES_USER: postgres          # database username
      POSTGRES_PASSWORD: password123   # database password
      POSTGRES_DB: app_db              # database name
    ports:
      - "5432:5432"  # host:container — access the DB from your machine on port 5432
    volumes:
      - db_data:/var/lib/postgresql/data  # saves DB data so it survives container restarts

  # --- 2. BACKEND SERVICE ---
  # Runs the Next.js app to handle all API routes (/api/notes, /api/health)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: backend_container
    ports:
      - "3001:3000"  # host:container — you can test the API at http://localhost:3001
    environment:
      DATABASE_URL: postgresql://postgres:password123@db:5432/app_db  # connects to the "db" service above
    depends_on:
      - db  # make sure the database starts before the backend

  # --- 3. FRONTEND SERVICE ---
  # Runs the Next.js app to serve the UI pages
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: frontend_container
    ports:
      - "3000:3000"  # host:container — open http://localhost:3000 in your browser
    environment:
      BACKEND_URL: http://backend:3000  # tells the frontend to forward /api calls to the backend container
    depends_on:
      - backend  # make sure the backend starts before the frontend

# Named volume to persist the database data on your machine
volumes:
  db_data:
