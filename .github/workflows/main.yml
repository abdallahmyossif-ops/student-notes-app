name: Simple CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. اسحب الكود
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. نزّل Node.js
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3. نزّل dependencies
      - name: Install dependencies
        run: npm install

      # 4. اعمل build (لو عندك build script)
      - name: Build
        run: npm run build --if-present

      # 5. test بسيط
      - name: Run test
        run: echo "CI is working"
