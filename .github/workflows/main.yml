name: Simple CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1-get code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. install Node.js
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3. install dependencies
      - name: Install dependencies
        run: npm install

      # 4. اعمل build
      - name: Build
        run: npm run build --if-present

      # 5. simple test 
      - name: Run test
        run: echo "CI is working 🚀"
